name: Refresh data

# Run daily at 8am UTC, or trigger manually from the Actions tab
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── 1. Generate fresh data ──────────────────────────────────────────────
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Generate data
        run: node generate.js
        working-directory: backend
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # ── 2. Build frontend with fresh data bundled ───────────────────────────
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ── 3. Deploy to GitHub Pages (docs/) ───────────────────────────────────
      - name: Deploy to docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          rm -rf docs
          cp -r frontend/dist docs
          git add frontend/src/data/fallback.json docs/
          git diff --staged --quiet && echo "No data changes — skipping commit" && exit 0
          git commit -m "chore: refresh data $(date -u +'%Y-%m-%d') [skip ci]"
          git push
