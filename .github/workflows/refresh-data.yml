name: Refresh data

# Run daily at 8am UTC, or trigger manually from the Actions tab
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 1. Install backend deps (includes mysql2) ──────────────────────────
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      # ── 2. Generate all scored JSON from MySQL ─────────────────────────────
      - name: Generate all data
        run: node generate-all.js
        working-directory: backend
        env:
          MYSQL_HOST:     ${{ secrets.MYSQL_HOST }}
          MYSQL_USER:     ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

      # ── 2b. Generate PDF report cards ────────────────────────────────────
      - name: Generate PDF reports
        run: node generate-reports.js
        working-directory: backend

      # ── 3. Build all three frontends ───────────────────────────────────────
      - name: Build provinces
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: ''
          VITE_BASE_PATH: /provinces/

      - name: Build cities
        run: cd cities && npm ci && npm run build
        env:
          VITE_API_URL: ''

      - name: Build MPs
        run: cd mps && npm ci && npm run build
        env:
          VITE_API_URL: ''

      # ── 4. Commit everything → cPanel Git auto-deploys ────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -f api/data.json api/cities.json api/mps.json
          git add -f frontend/dist/ cities/dist/ mps/dist/
          git add -f frontend/src/data/fallback.json
          git add -f reports/
          git diff --staged --quiet && echo "No data changes — skipping commit" && exit 0
          git commit -m "chore: refresh data $(date -u +'%Y-%m-%d') [skip ci]"
          git push

      # ── 5. Trigger cPanel to pull + deploy ─────────────────────────────────
      - name: Deploy to cPanel
        run: |
          curl -s -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://seanwood.com:2083/execute/VersionControl/update?repository_root=/home/seanw2/repositories/provincial-scorecard&branch=main" \
            -o /dev/null -w "cPanel update: HTTP %{http_code}\n"
          sleep 5
          curl -s -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://seanwood.com:2083/execute/VersionControlDeployment/create?repository_root=/home/seanw2/repositories/provincial-scorecard" \
            -o /dev/null -w "cPanel update: HTTP %{http_code}\n"
