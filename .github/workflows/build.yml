name: Build Frontend

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Provinces ──────────────────────────────────────────────────────────
      - name: Install provinces dependencies
        run: cd frontend && npm ci

      - name: Build provinces
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /

      # ── Cities ─────────────────────────────────────────────────────────────
      - name: Install cities dependencies
        run: cd cities && npm ci

      - name: Build cities
        run: cd cities && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── Deploy provinces to root (clean-slate first) ────────────────────
      - name: Deploy provinces to CWH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.seanwood.com
          username: claudeauto@bangforyourduck.ca
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./frontend/dist/
          server-dir: /
          dangerous-clean-slate: true

      # ── Deploy cities to /cities/ (after provinces, since clean-slate runs first) ──
      - name: Deploy cities to CWH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.seanwood.com
          username: claudeauto@bangforyourduck.ca
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./cities/dist/
          server-dir: /cities/
