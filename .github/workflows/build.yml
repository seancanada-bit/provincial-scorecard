name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build all three frontends ──────────────────────────────────────
      - name: Install & build provinces
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: ''
          VITE_BASE_PATH: /

      - name: Install & build cities
        run: cd cities && npm ci && npm run build
        env:
          VITE_API_URL: ''

      - name: Install & build MPs
        run: cd mps && npm ci && npm run build
        env:
          VITE_API_URL: ''

      # ── Commit built files → cPanel Git auto-deploys ───────────────────
      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f frontend/dist/ cities/dist/ mps/dist/
          git diff --staged --quiet && echo "No build changes" && exit 0
          git commit -m "chore: build frontends $(date -u +'%Y-%m-%d') [skip ci]"
          git push
