<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Red rounded tile -->
  <rect width="32" height="32" rx="7" fill="#D52B1E"/>
  <!-- Duck silhouette: overlapping shapes merge into one solid form -->
  <!-- Body -->
  <ellipse cx="14" cy="21" rx="10" ry="7" fill="white"/>
  <!-- Neck bridge (fills the gap between body and head) -->
  <ellipse cx="20" cy="17" rx="5" ry="5" fill="white"/>
  <!-- Head -->
  <circle cx="23" cy="12" r="5" fill="white"/>
  <!-- Tail feather -->
  <ellipse cx="5" cy="18" rx="3.5" ry="2.5" fill="white" transform="rotate(-25,5,18)"/>
  <!-- Bill (red = punched out of white head) -->
  <polygon points="27,10.5 31.5,12.5 27,14.5" fill="#D52B1E"/>
  <!-- Eye -->
  <circle cx="24.5" cy="10.5" r="1.3" fill="#D52B1E"/>
</svg>
