services:
  - type: web
    name: provincial-scorecard-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false          # set to your CWH domain, e.g. https://bangforyourduck.ca
