---
deployment:
  tasks:
    - export DEPLOYPATH=/home/seanw2/public_html/bangforyourduck.ca
    # Portal (root) — the landing page
    - /bin/cp portal/index.html $DEPLOYPATH/
    - /bin/cp portal/.htaccess $DEPLOYPATH/
    # Provinces (now at /provinces/)
    - /bin/mkdir -p $DEPLOYPATH/provinces
    - /bin/cp -R frontend/dist/* $DEPLOYPATH/provinces/
    # Cities
    - /bin/mkdir -p $DEPLOYPATH/cities
    - /bin/cp -R cities/dist/* $DEPLOYPATH/cities/
    # MPs
    - /bin/mkdir -p $DEPLOYPATH/mps
    - /bin/cp -R mps/dist/* $DEPLOYPATH/mps/
    # API (PHP + JSON files)
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/cp api/*.json $DEPLOYPATH/api/ 2>/dev/null; true
    - /bin/cp api/*.php $DEPLOYPATH/api/
    - /bin/cp api/.htaccess $DEPLOYPATH/api/
